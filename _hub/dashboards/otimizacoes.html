<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Otimizações do Site — Escuta o Véio!</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: #0f0f0f; color: #e5e5e5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px; min-height: 100vh;
    }

    .page { max-width: 1400px; margin: 0 auto; padding: 32px 24px; }

    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      color: #444; text-decoration: none; font-size: 12px;
      margin-bottom: 20px; transition: color .15s;
    }
    .back-link:hover { color: #94a3b8; }

    header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 4px; }
    header h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
    header span { font-size: 13px; color: #555; }
    .header-meta { font-size: 12px; color: #444; margin-bottom: 32px; }

    .section-title {
      font-size: 11px; font-weight: 600; color: #555;
      text-transform: uppercase; letter-spacing: 0.7px;
      margin-bottom: 12px; margin-top: 32px;
      display: flex; align-items: center; gap: 8px;
    }

    /* Cards */
    .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(175px, 1fr)); gap: 10px; }
    .card {
      background: #141414; border: 1px solid #222;
      border-radius: 10px; padding: 16px 18px;
    }
    .card .lbl { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
    .card .desc { font-size: 9px; color: #333; margin-bottom: 8px; }
    .card .val { font-size: 22px; font-weight: 700; letter-spacing: -0.8px; line-height: 1.1; }
    .card .sub { font-size: 11px; color: #555; margin-top: 7px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

    /* Status */
    .good  { color: #4ade80 !important; }
    .warn  { color: #f59e0b !important; }
    .poor  { color: #f87171 !important; }
    .blue  { color: #60a5fa !important; }
    .purple { color: #a78bfa !important; }

    .dot-good { background: #4ade80; }
    .dot-warn { background: #f59e0b; }
    .dot-poor { background: #f87171; }
    .dot-blue { background: #60a5fa; }

    .badge {
      font-size: 9px; border-radius: 4px; padding: 1px 6px;
      font-weight: 600; letter-spacing: 0.2px;
    }
    .bg  { color: #4ade80; background: rgba(74,222,128,0.12); }
    .bw  { color: #f59e0b; background: rgba(245,158,11,0.12); }
    .bp  { color: #f87171; background: rgba(248,113,113,0.12); }
    .bd  { color: #f59e0b; background: rgba(245,158,11,0.10); }
    .trend { font-size: 10px; font-weight: 600; }

    /* Charts */
    .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 860px) { .charts { grid-template-columns: 1fr; } }
    .chart-card {
      background: #141414; border: 1px solid #222;
      border-radius: 10px; padding: 18px 20px;
    }
    .chart-card h3 {
      font-size: 10px; font-weight: 600; color: #555;
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 14px;
    }
    .chart-wrap { position: relative; height: 190px; }

    /* Funnel */
    .funnel { display: flex; flex-direction: column; gap: 10px; padding: 4px 0; }
    .funnel-row {
      display: grid; grid-template-columns: 160px 1fr 90px 68px;
      align-items: center; gap: 14px;
    }
    .funnel-lbl { font-size: 11px; color: #777; }
    .funnel-bar-bg { background: #1a1a1a; border-radius: 3px; height: 7px; overflow: hidden; }
    .funnel-bar { height: 100%; border-radius: 3px; }
    .funnel-val { font-size: 12px; font-weight: 700; color: #ccc; text-align: right; }
    .funnel-drop { font-size: 11px; text-align: right; }

    /* Table */
    .table-wrap { overflow-x: auto; border: 1px solid #1e1e1e; border-radius: 10px; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; white-space: nowrap; }
    thead th {
      background: #111; color: #555;
      text-transform: uppercase; letter-spacing: 0.4px;
      font-size: 10px; font-weight: 600;
      padding: 10px 14px; text-align: right;
      border-bottom: 1px solid #1e1e1e;
    }
    thead th:first-child { text-align: left; }
    tbody tr { border-bottom: 1px solid #1a1a1a; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #161616; }
    tbody td { padding: 9px 14px; text-align: right; color: #ccc; }
    tbody td:first-child { text-align: left; color: #888; font-weight: 500; }

    hr { border: none; border-top: 1px solid #1a1a1a; margin: 28px 0; }
    footer { margin-top: 40px; font-size: 11px; color: #2a2a2a; }
  </style>
</head>
<body>
<div class="page">

  <a href="index.html" class="back-link">← Hub</a>

  <header>
    <h1>Otimizações do Site</h1>
    <span>Escuta o Véio!</span>
  </header>
  <p class="header-meta" id="header-meta"></p>

  <!-- ── CORE WEB VITALS ─────────────────────────── -->
  <p class="section-title">
    Core Web Vitals · Mobile
    <span class="badge bd" id="cwv-badge"></span>
  </p>
  <div class="cards" id="cwv-cards"></div>

  <!-- ── CRO ────────────────────────────────────── -->
  <p class="section-title" style="margin-top:28px;">
    Conversão (CRO)
    <span class="badge bd" id="cro-badge"></span>
  </p>
  <div class="cards" id="cro-cards"></div>

  <hr>

  <!-- ── CHARTS ─────────────────────────────────── -->
  <p class="section-title" style="margin-top:0">Evolução Semanal</p>
  <div class="charts">
    <div class="chart-card">
      <h3>LCP — Largest Contentful Paint (s)</h3>
      <div class="chart-wrap"><canvas id="ch-lcp"></canvas></div>
    </div>
    <div class="chart-card">
      <h3>Taxa de Conversão (%)</h3>
      <div class="chart-wrap"><canvas id="ch-conv"></canvas></div>
    </div>
    <div class="chart-card">
      <h3>Performance Score</h3>
      <div class="chart-wrap"><canvas id="ch-score"></canvas></div>
    </div>
    <div class="chart-card">
      <h3>Abandono de Carrinho (%)</h3>
      <div class="chart-wrap"><canvas id="ch-abandon"></canvas></div>
    </div>
  </div>

  <!-- ── FUNNEL ─────────────────────────────────── -->
  <p class="section-title">Funil de Conversão</p>
  <div class="chart-card" style="margin-bottom:14px;">
    <div class="funnel" id="funnel"></div>
  </div>

  <!-- ── TABELA ─────────────────────────────────── -->
  <p class="section-title">Páginas — Detalhamento CWV</p>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Página</th>
          <th>Score</th>
          <th>LCP</th>
          <th>INP</th>
          <th>CLS</th>
          <th>FCP</th>
          <th>TTFB</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="pages-tbody"></tbody>
    </table>
  </div>

  <footer id="footer"></footer>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// DATA — Atualize esta seção quando novas planilhas forem fornecidas
// Período: string de exibição
// cwv: métricas Core Web Vitals com limites Good/Poor do Google
// cro: métricas de conversão
// timeline: séries semanais para os gráficos
// funnel: etapas do funil (ordem decrescente)
// pages: breakdown por página
// ═══════════════════════════════════════════════════════════════════════════
const DATA = {
  updatedAt:  "2026-05-14",
  period:     "Últimos 30 dias",
  dataSource: "Demonstrativo",   // "Real" | "Demonstrativo" | "Misto"

  cwv: [
    { key: "lcp",   label: "LCP",   desc: "Largest Contentful Paint", value: 3.2,  unit: "s",  good: 2.5,  poor: 4.0,  lowerBetter: true,  trend: -0.4, trendUnit: "s"  },
    { key: "inp",   label: "INP",   desc: "Interaction to Next Paint",  value: 180,  unit: "ms", good: 200,  poor: 500,  lowerBetter: true,  trend: -20,  trendUnit: "ms" },
    { key: "cls",   label: "CLS",   desc: "Cumulative Layout Shift",    value: 0.08, unit: "",   good: 0.1,  poor: 0.25, lowerBetter: true,  trend: -0.02,trendUnit: ""   },
    { key: "fcp",   label: "FCP",   desc: "First Contentful Paint",     value: 1.6,  unit: "s",  good: 1.8,  poor: 3.0,  lowerBetter: true,  trend: -0.3, trendUnit: "s"  },
    { key: "ttfb",  label: "TTFB",  desc: "Time to First Byte",         value: 620,  unit: "ms", good: 800,  poor: 1800, lowerBetter: true,  trend: -80,  trendUnit: "ms" },
    { key: "score", label: "Score", desc: "Performance Score (geral)",  value: 72,   unit: "",   good: 90,   poor: 50,   lowerBetter: false, trend: 5,    trendUnit: ""   },
  ],

  cro: [
    { key: "sessions",    label: "Sessões",              value: 24173, fmt: "n",   color: "#60a5fa" },
    { key: "convRate",    label: "Taxa de Conversão",    value: 0.88,  fmt: "pct", color: "#4ade80" },
    { key: "cartAb",      label: "Abandono de Carrinho", value: 59.5,  fmt: "pct", color: "#f59e0b" },
    { key: "checkoutAb",  label: "Abandono de Checkout", value: 74.9,  fmt: "pct", color: "#f87171" },
    { key: "aov",         label: "Ticket Médio",         value: 575,   fmt: "brl", color: "#60a5fa" },
    { key: "atcRate",     label: "Add-to-Cart Rate",     value: 8.7,   fmt: "pct", color: "#a78bfa" },
  ],

  timeline: {
    labels:     ["01/04","08/04","15/04","22/04","29/04","06/05","13/05"],
    lcp:        [4.1, 3.9, 3.7, 3.6, 3.4, 3.3, 3.2],
    score:      [60,  63,  65,  67,  69,  71,  72 ],
    convRate:   [0.81,0.82,0.84,0.83,0.86,0.87,0.88],
    cartAbandon:[65.0,64.0,63.5,62.0,61.0,60.0,59.5],
  },

  funnel: [
    { label: "Sessões",            value: 24173 },
    { label: "Visualizou Produto", value: 18500 },
    { label: "Adicionou ao Carr.", value: 2100  },
    { label: "Iniciou Checkout",   value: 850   },
    { label: "Comprou",            value: 213   },
  ],

  pages: [
    { url: "/ (Home)",    score: 78, lcp: 2.8, inp: 150, cls: 0.05, fcp: 1.4, ttfb: 520 },
    { url: "/categoria",  score: 68, lcp: 3.5, inp: 200, cls: 0.09, fcp: 1.7, ttfb: 610 },
    { url: "/produto/*",  score: 58, lcp: 4.1, inp: 220, cls: 0.12, fcp: 2.1, ttfb: 780 },
    { url: "/carrinho",   score: 82, lcp: 2.5, inp: 160, cls: 0.07, fcp: 1.3, ttfb: 490 },
    { url: "/checkout",   score: 88, lcp: 2.2, inp: 140, cls: 0.04, fcp: 1.2, ttfb: 440 },
    { url: "/busca",      score: 62, lcp: 3.8, inp: 210, cls: 0.10, fcp: 1.9, ttfb: 690 },
  ],
};
// ═══════════════════════════════════════════════════════════════════════════

// ── Helpers ─────────────────────────────────────────────────────────────────
function cwvStatus(m) {
  if (m.lowerBetter) {
    return m.value <= m.good ? "good" : m.value <= m.poor ? "warn" : "poor";
  } else {
    return m.value >= m.good ? "good" : m.value >= m.poor ? "warn" : "poor";
  }
}

function statusLabel(s) {
  return s === "good" ? "Bom" : s === "warn" ? "Melhorar" : "Ruim";
}

function fmtCWV(value, unit) {
  if (unit === "s")  return value.toFixed(1) + "s";
  if (unit === "ms") return value + "ms";
  return String(value);
}

function fmtCRO(m) {
  if (m.fmt === "pct") return m.value.toFixed(1) + "%";
  if (m.fmt === "brl") return "R$" + m.value.toLocaleString("pt-BR");
  return m.value.toLocaleString("pt-BR");
}

function trendHtml(trend, trendUnit, lowerBetter) {
  if (trend === 0) return "";
  const improved = lowerBetter ? trend < 0 : trend > 0;
  const cls  = improved ? "good" : "poor";
  const icon = trend > 0 ? "▲" : "▼";
  const sign = trend > 0 ? "+" : "";
  return `<span class="trend ${cls}">${icon} ${sign}${trend}${trendUnit}</span>`;
}

// ── Badges de fonte ──────────────────────────────────────────────────────────
const srcLabel = DATA.dataSource === "Real" ? "Dados reais"
               : DATA.dataSource === "Misto" ? "Dados mistos" : "Demonstrativo";
document.getElementById("cwv-badge").textContent  = srcLabel;
document.getElementById("cro-badge").textContent  = srcLabel;
document.getElementById("header-meta").textContent =
  DATA.period + " · Atualizado em " + DATA.updatedAt;

// ── CWV Cards ────────────────────────────────────────────────────────────────
const cwvContainer = document.getElementById("cwv-cards");
DATA.cwv.forEach(m => {
  const s = cwvStatus(m);
  const sClass = s === "good" ? "good" : s === "warn" ? "warn" : "poor";
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `
    <div class="lbl">${m.label}</div>
    <div class="desc">${m.desc}</div>
    <div class="val ${sClass}">${fmtCWV(m.value, m.unit)}</div>
    <div class="sub">
      <span class="dot dot-${sClass}"></span>
      <span class="badge b${sClass[0]}">${statusLabel(s)}</span>
      ${trendHtml(m.trend, m.trendUnit, m.lowerBetter)}
    </div>
  `;
  cwvContainer.appendChild(card);
});

// ── CRO Cards ────────────────────────────────────────────────────────────────
const croContainer = document.getElementById("cro-cards");
DATA.cro.forEach(m => {
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `
    <div class="lbl">${m.label}</div>
    <div class="desc">&nbsp;</div>
    <div class="val" style="color:${m.color}">${fmtCRO(m)}</div>
    <div class="sub"><span class="badge bd">Demo</span></div>
  `;
  croContainer.appendChild(card);
});

// ── Funnel ───────────────────────────────────────────────────────────────────
const funnelEl = document.getElementById("funnel");
const maxV  = DATA.funnel[0].value;
const fColors = ["#60a5fa","#818cf8","#a78bfa","#c084fc","#4ade80"];
DATA.funnel.forEach((step, i) => {
  const widthPct = (step.value / maxV * 100).toFixed(1);
  const prev = DATA.funnel[i - 1];
  const drop = prev ? ((1 - step.value / prev.value) * 100).toFixed(0) : null;
  const row  = document.createElement("div");
  row.className = "funnel-row";
  row.innerHTML = `
    <span class="funnel-lbl">${step.label}</span>
    <div class="funnel-bar-bg">
      <div class="funnel-bar" style="width:${widthPct}%;background:${fColors[i]}"></div>
    </div>
    <span class="funnel-val">${step.value.toLocaleString("pt-BR")}</span>
    <span class="funnel-drop">${drop
      ? `<span style="color:#f87171">−${drop}%</span>`
      : `<span style="color:#555">base</span>`}</span>
  `;
  funnelEl.appendChild(row);
});

// ── Pages Table ───────────────────────────────────────────────────────────────
const tbody = document.getElementById("pages-tbody");
DATA.pages.forEach(p => {
  const ls = p.lcp <= 2.5 ? "good" : p.lcp <= 4.0 ? "warn" : "poor";
  const is = p.inp <= 200 ? "good" : p.inp <= 500 ? "warn" : "poor";
  const cs = p.cls <= 0.1 ? "good" : p.cls <= 0.25 ? "warn" : "poor";
  const overall = [ls,is,cs].includes("poor") ? "poor" : [ls,is,cs].includes("warn") ? "warn" : "good";
  const sc = p.score >= 90 ? "#4ade80" : p.score >= 50 ? "#f59e0b" : "#f87171";
  const tr = document.createElement("tr");
  tr.innerHTML = `
    <td>${p.url}</td>
    <td style="color:${sc};font-weight:700">${p.score}</td>
    <td class="${ls}">${p.lcp.toFixed(1)}s</td>
    <td class="${is}">${p.inp}ms</td>
    <td class="${cs}">${p.cls.toFixed(2)}</td>
    <td>${p.fcp.toFixed(1)}s</td>
    <td>${p.ttfb}ms</td>
    <td><span class="badge b${overall[0]}">${statusLabel(overall)}</span></td>
  `;
  tbody.appendChild(tr);
});

// ── Chart defaults ────────────────────────────────────────────────────────────
Chart.defaults.color = "#555";
Chart.defaults.borderColor = "#1a1a1a";
Chart.defaults.font.family = "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
Chart.defaults.font.size = 11;

function mkLine(id, datasets) {
  new Chart(document.getElementById(id), {
    type: "line",
    data: {
      labels: DATA.timeline.labels,
      datasets: datasets.map(d => ({
        label: d.label, data: d.data,
        borderColor: d.color, backgroundColor: "transparent",
        borderWidth: 2, pointRadius: 3, pointBackgroundColor: d.color, tension: 0.35,
      }))
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: "#1a1a1a" }, ticks: { color: "#444" } },
        y: { grid: { color: "#1a1a1a" }, ticks: { color: "#444" } }
      }
    }
  });
}

mkLine("ch-lcp",    [{ label: "LCP (s)",        data: DATA.timeline.lcp,        color: "#f59e0b" }]);
mkLine("ch-conv",   [{ label: "Conversão (%)",   data: DATA.timeline.convRate,   color: "#4ade80" }]);
mkLine("ch-score",  [{ label: "Score",           data: DATA.timeline.score,      color: "#60a5fa" }]);
mkLine("ch-abandon",[{ label: "Abandono (%)",    data: DATA.timeline.cartAbandon,color: "#f87171" }]);

// ── Footer ───────────────────────────────────────────────────────────────────
document.getElementById("footer").textContent =
  "escutaoveio/e-commerce · _hub/dashboards/otimizacoes.html · " + new Date().getFullYear();
</script>
</body>
</html>
